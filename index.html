<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>연두야 놀자 🦜</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; user-select:none; -webkit-tap-highlight-color:transparent; }
html,body { width:100vw; height:100vh; overflow:hidden; background:#0a1f0a; font-family:'Segoe UI',sans-serif; }
#arena { position:fixed; inset:0; background:radial-gradient(ellipse at 50% 40%, #1a4020 0%, #061208 100%); }
.leaf { position:absolute; opacity:.13; animation:drift linear infinite; pointer-events:none; }
@keyframes drift { 0%{transform:translateY(-50px) rotate(0deg);opacity:0} 10%{opacity:.13} 90%{opacity:.13} 100%{transform:translateY(110vh) rotate(400deg);opacity:0} }
.target { position:fixed; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; overflow:visible; animation:pop-in .22s cubic-bezier(.34,1.7,.64,1) forwards; }
@keyframes pop-in { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }
.target.dying { animation:burst .3s forwards !important; pointer-events:none; }
@keyframes burst { 0%{transform:scale(1);opacity:1} 60%{transform:scale(1.8);opacity:.4} 100%{transform:scale(0);opacity:0} }
.target.expiring { animation:throb .35s ease-in-out infinite alternate !important; }
@keyframes throb { from{filter:drop-shadow(0 0 0px rgba(255,180,50,0))} to{filter:drop-shadow(0 0 14px rgba(255,180,50,.8))} }
@keyframes wobble { 0%{transform:scale(1)} 35%{transform:scale(1.2) rotate(-6deg)} 65%{transform:scale(.9) rotate(4deg)} 100%{transform:scale(1)} }
.hp-dots { position:absolute; bottom:-16px; left:50%; transform:translateX(-50%); display:flex; gap:4px; pointer-events:none; }
.hp-dot { width:9px; height:9px; border-radius:50%; background:#ef5350; box-shadow:0 0 5px #ef5350; }
.hp-dot.empty { background:rgba(255,255,255,.2); box-shadow:none; }
.particle { position:fixed; border-radius:50%; pointer-events:none; z-index:20; animation:pfly .55s forwards; }
@keyframes pfly { 0%{transform:scale(1);opacity:1} 100%{transform:scale(0) translate(var(--dx),var(--dy));opacity:0} }
.burst-emoji { position:fixed; pointer-events:none; z-index:25; font-size:3rem; animation:bpop .5s forwards; }
@keyframes bpop { 0%{transform:scale(0);opacity:1} 50%{transform:scale(1.6);opacity:1} 100%{transform:scale(2.4);opacity:0} }
.speech { position:fixed; z-index:35; background:rgba(0,0,0,.75); font-size:1.4rem; font-weight:900; padding:7px 16px; border-radius:50px; pointer-events:none; white-space:nowrap; animation:sfloat .9s forwards; }
@keyframes sfloat { 0%{opacity:1;transform:translateY(0) scale(1)} 20%{transform:translateY(-10px) scale(1.12)} 100%{opacity:0;transform:translateY(-60px) scale(.85)} }
#score-display { position:fixed; top:14px; right:16px; z-index:40; text-align:right; pointer-events:none; }
#score-display .num { font-size:2.6rem; font-weight:900; color:#f5e642; text-shadow:0 0 18px rgba(245,230,66,.5); line-height:1; }
#score-display .lbl { font-size:.62rem; color:#4a8a4a; letter-spacing:2px; text-transform:uppercase; }
#flash { position:fixed; inset:0; pointer-events:none; z-index:45; opacity:0; }
.flash-anim { animation:flashanim .22s forwards; }
@keyframes flashanim { 0%{opacity:.25} 100%{opacity:0} }
#topblock { position:fixed; top:0; left:0; right:0; height:50px; z-index:998; }
#bottomblock { position:fixed; bottom:0; left:0; right:0; height:50px; z-index:998; }
#start { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; z-index:50; background:rgba(6,18,8,.96); }
#start.hidden { display:none; }
.start-bird { font-size:6.5rem; animation:bob 1.6s ease-in-out infinite; filter:drop-shadow(0 0 28px rgba(76,175,80,.6)); }
@keyframes bob { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-13px) rotate(3deg)} }
.start-title { font-size:2.6rem; font-weight:900; color:#f5e642; letter-spacing:2px; }
.start-sub { font-size:.95rem; color:#5aad5a; text-align:center; line-height:1.9; }
/* 버튼에 강제 포인터 이벤트 허용 및 유저 선택 활성화 세팅 추가 */
.btn-start { width:180px; height:180px; border-radius:50%; background:radial-gradient(circle at 38% 32%, #6abf6a, #2e7d32); border:none; font-size:3.5rem; cursor:pointer !important; pointer-events: auto !important; user-select: auto !important; box-shadow:0 0 40px rgba(76,175,80,.5); animation:pbtn 1.5s ease-in-out infinite; }
.btn-start:active { transform:scale(.88); }
@keyframes pbtn { 0%,100%{box-shadow:0 0 40px rgba(76,175,80,.5)} 50%{box-shadow:0 0 70px rgba(76,175,80,.8)} }
</style>
</head>
<body>
<div id="arena"></div>
<div id="flash"></div>
<div id="topblock"></div>
<div id="bottomblock"></div>
<div id="score-display"><div class="num" id="score-num">0</div><div class="lbl">점수</div></div>
<div id="start">
  <div class="start-bird">🦜</div>
  <div class="start-title">연두야 놀자!</div>
  <div class="start-sub">동그라미를 쪼아~<br>발로 밟아도 돼! 🐾</div>
  <button class="btn-start" onclick="startGame()">🌿</button>
</div>
<script>
/* TTS */
const synth = window.speechSynthesis || null;
let koVoice = null, ttsUnlocked = false;
function loadVoices() {
  if (!synth) return;
  const all = synth.getVoices();
  koVoice = all.find(v => v.lang === 'ko-KR') || all.find(v => v.lang.startsWith('ko')) || all[0] || null;
}
if (synth) { loadVoices(); if ('onvoiceschanged' in synth) synth.onvoiceschanged = loadVoices; }
function unlockTTS() {
  if (!synth || ttsUnlocked) return;
  ttsUnlocked = true;
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0; u.lang = 'ko-KR'; synth.speak(u);
  setTimeout(loadVoices, 300);
}
function speak(text) {
  if (!synth) return;
  try {
    synth.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 0.9; u.pitch = 1.1; u.volume = 1.0;
      if (koVoice) u.voice = koVoice;
      synth.speak(u);
    }, 80);
  } catch(e) {}
}

/* AUDIO */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function getACtx() { if (!actx) actx = new AudioCtx(); if (actx.state === 'suspended') actx.resume(); return actx; }
function playSoft(freq = 520) {
  try {
    const ctx = getACtx(), osc = ctx.createOscillator(), gain = ctx.createGain(), f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 2000;
    osc.connect(f); f.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.2, ctx.currentTime + 0.04);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, ctx.currentTime + 0.22);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}
function playChime() { [523, 659, 784].forEach((f, i) => setTimeout(() => playSoft(f), i * 80)); }
function playBoom() {
  try {
    const ctx = getACtx(), osc = ctx.createOscillator(), gain = ctx.createGain(), f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 800;
    osc.connect(f); f.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.18);
  } catch(e) {}
}
