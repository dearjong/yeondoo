/* TTS */
const synth = window.speechSynthesis || null;
let koVoice = null, ttsUnlocked = false;
function loadVoices() {
  if (!synth) return;
  const all = synth.getVoices();
  koVoice = all.find(v => v.lang === 'ko-KR') || all.find(v => v.lang.startsWith('ko')) || all[0] || null;
}
if (synth) { loadVoices(); if ('onvoiceschanged' in synth) synth.onvoiceschanged = loadVoices; }
function unlockTTS() {
  if (!synth || ttsUnlocked) return;
  ttsUnlocked = true;
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0; u.lang = 'ko-KR'; synth.speak(u);
  setTimeout(loadVoices, 300);
}
function speak(text) {
  if (!synth) return;
  try {
    synth.cancel();
    setTimeout(() => {
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 0.9; u.pitch = 1.1; u.volume = 1.0;
      if (koVoice) u.voice = koVoice;
      synth.speak(u);
    }, 80);
  } catch(e) {}
}

/* AUDIO */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function getACtx() { if (!actx) actx = new AudioCtx(); if (actx.state === 'suspended') actx.resume(); return actx; }
function playSoft(freq = 520) {
  try {
    const ctx = getACtx(), osc = ctx.createOscillator(), gain = ctx.createGain(), f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 2000;
    osc.connect(f); f.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 1.2, ctx.currentTime + 0.04);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.7, ctx.currentTime + 0.22);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.22);
  } catch(e) {}
}
function playChime() { [523, 659, 784].forEach((f, i) => setTimeout(() => playSoft(f), i * 80)); }
function playBoom() {
  try {
    const ctx = getACtx(), osc = ctx.createOscillator(), gain = ctx.createGain(), f = ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 800;
    osc.connect(f); f.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.18);
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.18);
  } catch(e) {}
}

  sopaenyan: { pts:10, hp:2, glow:'#66bb6a', bg:'#1b5e20', burst:'вЪ°', sound:'мПШнМ®лГФ',     sfx:()=>playBoom(), hitSvg:'sopaenyan_hit' },
  sopaenom:  { pts:10, hp:2, glow:'#90caf9', bg:'#0d47a1', burst:'рЯТ•', sound:'мПШнМ®лЖИ',     sfx:()=>playBoom(), hitSvg:'sopaenom_hit' },
  meojori:   { pts:10, hp:2, glow:'#ffab91', bg:'#ff7043', burst:'рЯШµ', sound:'л®Єм†Ал¶ђ',     sfx:()=>playBoom(), hitSvg:'meojori_hit' },
};

const SIZES = { grain:78, kitty:86, prince:88, yeondu:92, narknom:88, sopaenyan:86, sopaenom:88, meojori:86 };
const VILLAIN_KEYS = ['narknom','sopaenyan','sopaenom','meojori'];
const NORMAL_KEYS  = ['grain','kitty','prince','yeondu'];
const VILLAIN_W = { narknom:3, sopaenyan:3, sopaenom:3, meojori:3 };
const NORMAL_W  = { grain:6, kitty:5, prince:1, yeondu:2 };

function pickKey() {
  if (Math.random() < 0.5) {
    const tw = Object.values(VILLAIN_W).reduce((a,b)=>a+b,0); let r = Math.random()*tw;
    for (const k of VILLAIN_KEYS) { r -= VILLAIN_W[k]; if (r<=0) return k; } return 'narknom';
  } else {
    const tw = Object.values(NORMAL_W).reduce((a,b)=>a+b,0); let r = Math.random()*tw;
    for (const k of NORMAL_KEYS) { r -= NORMAL_W[k]; if (r<=0) return k; } return 'grain';
  }
}

let score=0, running=false, spawnTimer=null;
const active = new Map();

/* BG */
const arena = document.getElementById('arena');
['рЯНГ','рЯМњ','рЯМ±','рЯНА'].forEach(e => {
  for (let i=0; i<3; i++) {
    const l = document.createElement('div'); l.className='leaf';
    l.style.cssText = `left:${Math.random()*100}vw;font-size:${1.1+Math.random()*.8}rem;animation-duration:${10+Math.random()*13}s;animation-delay:${-Math.random()*22}s`;
    l.textContent = e; arena.appendChild(l);
  }
});

/* Wake lock */
let wakeLock = null;
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && running) await requestWakeLock();
});

function goFullscreen() {
  const el = document.documentElement;
  try { if (el.requestFullscreen) el.requestFullscreen(); else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen(); } catch(e) {}
}

/* л™®л∞ФмЭЉ мК§мЩАмЭінФД м∞®лЛ® вАФ touchлІМ, mouseлКФ мХИ к±ілУЬл¶Љ */
document.addEventListener('touchmove', e => e.preventDefault(), { passive:false });
document.getElementById('topblock').addEventListener('touchstart', e => e.preventDefault(), { passive:false });
document.getElementById('bottomblock').addEventListener('touchstart', e => e.preventDefault(), { passive:false });

/* SPAWN */
function spawn() {
  if (!running) return;
  const key = pickKey(), ch = CHARS[key], sz = SIZES[key] || 80;
  const el = document.createElement('div');
  el.className = 'target';
  el.style.cssText = `width:${sz}px;height:${sz}px;background:radial-gradient(circle at 38% 32%,${ch.glow}99,${ch.bg});box-shadow:0 0 24px ${ch.glow}44,0 4px 18px rgba(0,0,0,.4);border:2px solid ${ch.glow}33;`;
  el.innerHTML = SVG[key];

  let hp = ch.hp;
  if (hp > 1) {
    const dots = document.createElement('div'); dots.className = 'hp-dots';
    for (let i=0; i<hp; i++) { const d = document.createElement('div'); d.className = 'hp-dot'; dots.appendChild(d); }
    el.appendChild(dots);
  }

  const topOff = 55;
  const x = Math.random() * Math.max(10, window.innerWidth - sz);
  const y = topOff + Math.random() * Math.max(10, window.innerHeight - sz - topOff - 55);
  el.style.left = x+'px'; el.style.top = y+'px';
  document.body.appendChild(el);

  const speed = 0.28 + Math.random()*.5, angle = Math.random()*Math.PI*2;
  const state = { x, y, vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed, sz, key, ch, hp };
  active.set(el, state);

  state.lifeTimer = setTimeout(() => el.classList.add('expiring'), 4200);
  state.removeTimer = setTimeout(() => {
    if (active.has(el)) { cancelAnimationFrame(state.raf); active.delete(el); el.remove(); }
  }, 5200);

  function move() {
    if (!active.has(el)) return;
    state.x += state.vx; state.y += state.vy;
    const maxX = window.innerWidth-sz, maxY = window.innerHeight-sz;
    if (state.x<=0||state.x>=maxX) { state.vx*=-1; state.x=Math.max(0,Math.min(state.x,maxX)); }
    if (state.y<=topOff||state.y>=maxY) { state.vy*=-1; state.y=Math.max(topOff,Math.min(state.y,maxY)); }
    el.style.left=state.x+'px'; el.style.top=state.y+'px';
    state.raf = requestAnimationFrame(move);
  }
  state.raf = requestAnimationFrame(move);
  el.addEventListener('pointerdown', e => { e.preventDefault(); e.stopPropagation(); peck(el); }, { passive:false });
}

/* PECK */
function peck(el) {
  if (!active.has(el)) return;
  const s = active.get(el);
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;

  if (s.hp > 1) {
    s.hp--;
    const dots = el.querySelectorAll('.hp-dot');
    if (dots[s.hp]) dots[s.hp].classList.add('empty');
    if (s.ch.hitSvg && SVG[s.ch.hitSvg]) {
      const oldSvg = el.querySelector('svg');
      if (oldSvg) { const tmp = document.createElement('div'); tmp.innerHTML = SVG[s.ch.hitSvg]; el.replaceChild(tmp.firstChild, oldSvg); }
    }
    el.style.animation = 'none'; void el.offsetWidth; el.style.animation = 'wobble .25s ease-out';
    s.ch.sfx();
    speak(s.ch.sound);
    showSpeech(s.ch.sound, s.ch.glow, cx, cy);
    score += Math.floor(s.ch.pts/2);
    document.getElementById('score-num').textContent = score;
    return;
  }

  cancelAnimationFrame(s.raf);
  clearTimeout(s.lifeTimer); clearTimeout(s.removeTimer);
  active.delete(el); el.remove();
  score += s.ch.pts;
  document.getElementById('score-num').textContent = score;
  s.ch.sfx();
  speak(s.ch.sound);
  showSpeech(s.ch.sound, s.ch.glow, cx, cy);

  const flash = document.getElementById('flash');
  flash.style.background = s.ch.glow;
  flash.classList.remove('flash-anim'); void flash.offsetWidth; flash.classList.add('flash-anim');

  for (let i=0; i<10; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    const ang = Math.random()*Math.PI*2, dist = 45+Math.random()*70, psz = 7+Math.random()*13;
    p.style.cssText = `width:${psz}px;height:${psz}px;left:${cx-psz/2}px;top:${cy-psz/2}px;background:${s.ch.glow};--dx:${Math.cos(ang)*dist}px;--dy:${Math.sin(ang)*dist}px;`;
    document.body.appendChild(p); setTimeout(() => p.remove(), 580);
  }
  const be = document.createElement('div'); be.className = 'burst-emoji';
  be.textContent = s.ch.burst;
  be.style.left = (cx-22)+'px'; be.style.top = (cy-22)+'px';
  document.body.appendChild(be); setTimeout(() => be.remove(), 520);
}

function showSpeech(text, color, cx, cy) {
  const sb = document.createElement('div'); sb.className = 'speech';
  sb.textContent = text + '!';
  sb.style.left = Math.max(10, cx-70)+'px'; sb.style.top = (cy-55)+'px';
  sb.style.color = color;
  document.body.appendChild(sb); setTimeout(() => sb.remove(), 920);
}

function maintain() {
  if (!running) return;
  if (active.size < 3) spawn();
  spawnTimer = setTimeout(maintain, active.size < 2 ? 380 : 980);
}

async function startGame() {
  goFullscreen();
  await requestWakeLock();
  getACtx();
  unlockTTS();
  score=0; running=true;
  document.getElementById('score-num').textContent = '0';
  document.getElementById('start').classList.add('hidden');
  active.forEach((s,el) => { cancelAnimationFrame(s.raf); clearTimeout(s.lifeTimer); clearTimeout(s.removeTimer); el.remove(); });
  active.clear();
  spawn(); spawn(); spawn();
  maintain();
}
</script>
